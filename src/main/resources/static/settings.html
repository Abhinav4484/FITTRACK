<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>FITTRACK — SETTINGS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="cyberpunk.css" rel="stylesheet">
  <style>
    /* Page-specific styles */
    .settings-header {
      font-family: 'Audiowide', monospace;
      font-weight: 400;
      font-size: 2.5rem;
      background: linear-gradient(135deg, var(--cp-neon-pink), var(--cp-neon-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
      margin-bottom: 0.5rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    
    .settings-subtitle {
      color: var(--cp-text-dim);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    
    .settings-card {
      background: linear-gradient(135deg, rgba(26, 26, 46, 0.9) 0%, rgba(22, 33, 62, 0.9) 100%);
      border: 2px solid var(--cp-neon-cyan);
      border-radius: 0;
      padding: 2.5rem;
      max-width: 600px;
      margin: auto;
      margin-top: 3rem;
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      backdrop-filter: blur(15px);
      box-shadow: 
        0 0 40px rgba(0, 255, 255, 0.2),
        inset 0 0 0 1px rgba(255, 0, 255, 0.1);
    }
    
    .settings-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--cp-neon-pink), var(--cp-neon-cyan), var(--cp-neon-yellow));
      animation: cyberpunkGlow 3s ease-in-out infinite;
    }
    
    .settings-card:hover {
      border-color: var(--cp-neon-pink);
      box-shadow: 
        0 0 60px rgba(255, 0, 255, 0.4),
        inset 0 0 0 1px rgba(0, 255, 255, 0.2);
      transform: translateY(-8px) scale(1.02);
    }
    
    .settings-card h2 {
      font-family: 'Audiowide', monospace;
      font-size: 2rem;
      font-weight: 400;
      background: linear-gradient(135deg, var(--cp-neon-pink), var(--cp-neon-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
    }
    
    .form-label {
      font-family: 'Rajdhani', sans-serif;
      color: var(--cp-neon-cyan);
      font-weight: 600;
      margin-bottom: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.9rem;
    }
    
    .form-select, .form-control {
      background: rgba(26, 26, 46, 0.7);
      border: 2px solid rgba(0, 255, 255, 0.3);
      border-radius: 0;
      color: var(--cp-text-main);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      padding: 0.875rem 1rem;
      margin-bottom: 1rem;
      backdrop-filter: blur(10px);
    }
    
    .form-select:focus, .form-control:focus {
      border-color: var(--cp-neon-cyan);
      background: rgba(26, 26, 46, 0.9);
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
      color: var(--cp-text-main);
      outline: none;
    }
    
    .form-check-input {
      background-color: rgba(26, 26, 46, 0.7);
      border: 2px solid rgba(0, 255, 255, 0.3);
      border-radius: 0;
    }
    
    .form-check-input:checked {
      background-color: var(--cp-neon-cyan);
      border-color: var(--cp-neon-cyan);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
    }
    
    .form-check-label {
      font-family: 'Rajdhani', sans-serif;
      color: var(--cp-text-main);
      font-weight: 500;
      margin-left: 0.5rem;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--cp-neon-pink), var(--cp-neon-cyan));
      border: 2px solid transparent;
      color: var(--cp-bg-dark);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 1rem 2rem;
      border-radius: 0;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
    }
    
    .btn-primary:hover {
      background: linear-gradient(135deg, var(--cp-neon-cyan), var(--cp-neon-pink));
      box-shadow: 0 0 50px rgba(255, 0, 255, 0.6);
      transform: translateY(-3px);
    }
    
    .theme-preview {
      width: 40px;
      height: 40px;
      border: 2px solid var(--cp-neon-cyan);
      border-radius: 0;
      margin-left: 10px;
      display: inline-block;
      vertical-align: middle;
      transition: all 0.3s ease;
    }
    
    .theme-preview.cyberpunk {
      background: linear-gradient(135deg, #ff00ff, #00ffff);
    }
    
    .theme-preview.neon-blue {
      background: linear-gradient(135deg, #0066ff, #00ccff);
    }
    
    .theme-preview.matrix-green {
      background: linear-gradient(135deg, #00ff00, #00cc00);
    }
    
    .settings-message {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 0;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: none;
    }
    
    .settings-message.success {
      background: rgba(0, 255, 136, 0.2);
      border: 1px solid var(--cp-neon-green);
      color: var(--cp-neon-green);
    }
    
    .settings-message.error {
      background: rgba(255, 0, 102, 0.2);
      border: 1px solid var(--cp-neon-red);
      color: var(--cp-neon-red);
    }
    
    /* Bootup sequence */
    .bootup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--cp-bg-darker);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: bootupFadeOut 0.5s ease-out 3s forwards;
    }
    
    .bootup-logo {
      font-family: 'Audiowide', monospace;
      font-size: 4rem;
      font-weight: 400;
      background: linear-gradient(135deg, var(--cp-neon-pink), var(--cp-neon-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 50px rgba(0, 255, 255, 0.8);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: bootupGlow 2s ease-in-out infinite;
    }
    
    .bootup-subtitle {
      font-family: 'Rajdhani', sans-serif;
      color: var(--cp-neon-cyan);
      font-size: 1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 1rem;
      animation: bootupPulse 1.5s ease-in-out infinite;
    }
    
    .bootup-progress {
      width: 300px;
      height: 4px;
      background: rgba(0, 255, 255, 0.2);
      border-radius: 2px;
      margin-top: 2rem;
      overflow: hidden;
    }
    
    .bootup-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--cp-neon-pink), var(--cp-neon-cyan));
      width: 0%;
      animation: bootupProgress 3s ease-out forwards;
    }
    
    @keyframes bootupGlow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.5)); }
      50% { filter: drop-shadow(0 0 40px rgba(255, 0, 255, 0.8)); }
    }
    
    @keyframes bootupPulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    
    @keyframes bootupProgress {
      0% { width: 0%; }
      100% { width: 100%; }
    }
    
    @keyframes bootupFadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }
  </style>
</head>
<body>
  <!-- Bootup Sequence -->
  <div class="bootup-overlay" id="bootupOverlay">
    <div class="bootup-logo">FITTRACK</div>
    <div class="bootup-subtitle">FITNESS TRACKING SYSTEM</div>
    <div class="bootup-progress">
      <div class="bootup-progress-bar"></div>
    </div>
  </div>

  <div class="container-fluid">
    <div class="row g-0">
      <!-- Sidebar -->
      <aside class="col-auto sidebar d-flex flex-column gap-3">
        <div class="brand">
          <div class="brand-logo">
            <span>FT</span>
          </div>
          <div class="brand-text">
                        <h1 style="font-size: 1.6rem; white-space: nowrap;">FITTRACK</h1>
            <p>FITNESS TRACKING SYSTEM</p>
          </div>
        </div>
        <nav class="nav flex-column">
          <a class="nav-link" href="index.html"><i class="bi bi-speedometer2"></i>Dashboard</a>
          <a class="nav-link" href="workouts.html"><i class="bi bi-bar-chart-line"></i>Workouts</a>
          <a class="nav-link" href="nutrition.html"><i class="bi bi-basket"></i>Nutrition</a>
          <a class="nav-link" href="progress.html"><i class="bi bi-graph-up"></i>Progress</a>
          <a class="nav-link" href="profile.html"><i class="bi bi-person-circle"></i>Profile</a>
          <a class="nav-link active" href="settings.html"><i class="bi bi-gear"></i>Settings</a>
          <a class="nav-link" href="details.html"><i class="bi bi-card-text"></i>Details</a>
        </nav>
      </aside>
      
      <main class="col d-flex justify-content-center">
        <div class="settings-card w-100">
          <h2>SYSTEM SETTINGS</h2>
          <form id="settingsForm">
            <div class="mb-4">
              <label class="form-label">Preferred Units</label>
              <select class="form-select" id="unitScale">
                <option value="metric">Metric (kg, cm)</option>
                <option value="imperial">Imperial (lbs, ft)</option>
              </select>
            </div>
            
            <div class="mb-4">
              <label class="form-label">Notification Settings</label>
              <div class="form-check mb-2">
                <input type="checkbox" id="emailAlerts" class="form-check-input"> 
                <label for="emailAlerts" class="form-check-label">Enable Email Alerts</label>
              </div>
              <div class="form-check mb-2">
                <input type="checkbox" id="workoutReminders" class="form-check-input"> 
                <label for="workoutReminders" class="form-check-label">Workout Reminders</label>
              </div>
              <div class="form-check mb-2">
                <input type="checkbox" id="progressUpdates" class="form-check-input"> 
                <label for="progressUpdates" class="form-check-label">Progress Updates</label>
              </div>
            </div>
            
            <div class="mb-4">
              <label class="form-label">Theme Settings</label>
              <select class="form-select" id="themeSelect">
                <option value="cyberpunk">Cyberpunk (Default)</option>
                <option value="neon-blue">Neon Blue</option>
                <option value="matrix-green">Matrix Green</option>
              </select>
              <div class="theme-preview cyberpunk" id="themePreview"></div>
            </div>
            
            <button class="btn btn-primary w-100" type="submit">
              <i class="bi bi-save me-2"></i>SAVE SETTINGS
            </button>
            
            <div class="settings-message" id="settingsMessage"></div>
          </form>
        </div>
      </main>
    </div>
  </div>

  <script src="cyberpunk-effects.js"></script>
  <script>
    // Bootup sequence
    window.addEventListener('load', function() {
      setTimeout(() => {
        document.getElementById('bootupOverlay').style.display = 'none';
      }, 3500);
    });

    // Load saved settings
    function loadSettings() {
      const savedSettings = localStorage.getItem('fittrackSettings');
      if (savedSettings) {
        const settings = JSON.parse(savedSettings);
        
        // Load unit scale
        if (settings.unitScale) {
          document.getElementById('unitScale').value = settings.unitScale;
        }
        
        // Load notification settings
        if (settings.emailAlerts !== undefined) {
          document.getElementById('emailAlerts').checked = settings.emailAlerts;
        }
        if (settings.workoutReminders !== undefined) {
          document.getElementById('workoutReminders').checked = settings.workoutReminders;
        }
        if (settings.progressUpdates !== undefined) {
          document.getElementById('progressUpdates').checked = settings.progressUpdates;
        }
        
        // Load theme
        if (settings.theme) {
          document.getElementById('themeSelect').value = settings.theme;
          updateThemePreview(settings.theme);
        }
      }
    }

    // Save settings
    function saveSettings() {
      const settings = {
        unitScale: document.getElementById('unitScale').value,
        emailAlerts: document.getElementById('emailAlerts').checked,
        workoutReminders: document.getElementById('workoutReminders').checked,
        progressUpdates: document.getElementById('progressUpdates').checked,
        theme: document.getElementById('themeSelect').value
      };
      
      localStorage.setItem('fittrackSettings', JSON.stringify(settings));
      
      // Show success message
      const message = document.getElementById('settingsMessage');
      message.textContent = 'Settings saved successfully!';
      message.className = 'settings-message success';
      message.style.display = 'block';
      
      setTimeout(() => {
        message.style.display = 'none';
      }, 3000);
    }

    // Update theme preview
    function updateThemePreview(theme) {
      const preview = document.getElementById('themePreview');
      preview.className = `theme-preview ${theme}`;
    }

    // Theme change handler
    document.getElementById('themeSelect').addEventListener('change', function() {
      updateThemePreview(this.value);
    });

    // Form submit handler
    document.getElementById('settingsForm').addEventListener('submit', function(e) {
      e.preventDefault();
      saveSettings();
    });

    // Load settings on page load
    loadSettings();
  </script>
</body>
</html>
