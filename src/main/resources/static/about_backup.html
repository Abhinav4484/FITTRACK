<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Fit Track — About</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700&family=Inter:wght@400;700&display=swap');
    body {
      min-height:100vh;
      font-family:'Inter',Arial,sans-serif;
      background: radial-gradient(ellipse 55% 60% at 70% 12%, #0beaff33 2%, transparent 55%),
                  radial-gradient(ellipse 40% 55% at 18% 98%, #465aff28 2%, transparent 60%),
                  linear-gradient(120deg, #111624 0%, #162033 83%, #191645 100%) fixed;
      color: #eefbff;
      margin:0; overflow-x:hidden;
      position:relative;
    }
    .about-glow1 {
      position:fixed;z-index:0;right:-200px;top:-180px;width:440px;height:440px;
      background:radial-gradient(ellipse at 55% 62%,#13e3ff99 0 44%,transparent 80%);
      filter:blur(38px); pointer-events:none; opacity:.7;animation:aboutPulse 9s infinite alternate;mix-blend-mode:screen;
    }
    .about-glow2 {
      position:fixed;z-index:0;left:-140px;bottom:-100px;width:420px;height:340px;
      background:radial-gradient(ellipse at 70% 60%,#5cc6ff77 0 35%,transparent 100%);
      filter:blur(38px);pointer-events:none;opacity:.58;animation:aboutPulse2 11s infinite alternate;mix-blend-mode:screen;
    }
    @keyframes aboutPulse { 0%{opacity:.80;} 100%{opacity:.37;} }
    @keyframes aboutPulse2 { 0%{opacity:.65;} 100%{opacity:.41;} }
    .about-main {
      min-height: 97vh;
      display: flex; justify-content: center; align-items: center;
      position:relative;z-index:1;
    }
    .about-glass {
      background: linear-gradient(107deg, #181d31 85%, #0b1623 120%);
      border-radius: 28px;
      box-shadow: 0 7px 42px 12px #07294f60,0 1px 0 0 #36f1ff14;
      border: 1.8px solid #2b59cc1a;
      max-width: 510px;
      width: 100%;
      padding: 3.6rem 2.5rem 2.7rem 2.5rem;
      margin: 0 auto;
      animation: fadeInUp 1.13s cubic-bezier(.13,.67,.38,.99);
      position:relative;
      overflow:hidden;
    }
    @keyframes fadeInUp {from{opacity:0;transform:translateY(40px);}to{opacity:1;}}
    .about-glass:before {
      content:"";
      position:absolute;left:-42%;top:-38%;width:185%;height:120%;
      background:radial-gradient(circle at 70% 32%, #00e5ff36 0 50%, transparent 90%);
      opacity:.10;pointer-events:none;z-index:0;
    }
    .about-title {
      font-family:'Syne',sans-serif;
      font-weight:700;
      font-size:2.26rem;
      color:#fff;
      letter-spacing:-.6px;
      text-shadow:0 4px 32px #51ffe67d;
      margin-bottom:0.5rem;
      background: linear-gradient(84deg,#5afaff 50%,#fff 85%);
      background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
      animation:fadeInDown .8s cubic-bezier(.21,.8,.41,1.04);
    }
    .about-desc {
      color: #e6f8ff;
      font-size: 1.19rem;
      margin-bottom: 1.4rem;
      letter-spacing:.03em;
      animation:fadeIn .9s .13s both;
    }
    .about-icons {
      display: flex; margin-top:1.5rem; gap:1.5rem; justify-content:center; flex-wrap:wrap;
    }
    .about-icons i {
      font-size: 2.7rem;
      color: #32e3fe;
      filter: drop-shadow(0 0 12px #00ffd9b0);
      transition: color .19s, filter .2s, transform .18s;
      cursor:pointer;
    }
    .about-icons i:hover {
      color:#6aa6ff;
      filter: drop-shadow(0 0 27px #4be1ffec) brightness(1.17);
      transform:scale(1.13) rotate(-2deg);
    }
    .about-tags {
      margin-top: 2.2rem;
      display: flex; flex-wrap: wrap; gap: .77rem; justify-content: center;
    }
    .about-tag {
      font-size: 1.04rem;
      padding: .29rem 1.16rem;
      color: #0ff;
      background: rgba(26,49,89,0.85);
      border-radius: 20px;
      border:1.2px solid #32e3fe77;
      letter-spacing:.09em;
      box-shadow:0 1px 11px #269bbf2c;
      font-weight:600;
    }
    @media (max-width:600px){
      .about-main{align-items:flex-start;}
      .about-glass{padding:2.2rem 1rem;}
      .about-title{font-size:1.45rem;}
      .about-desc{font-size:.98rem;}
    }
  </style>
</head>
<body>
  <div class="about-glow1"></div>
  <div class="about-glow2"></div>
  <main class="about-main">
    <section class="about-glass text-center">
      <div class="about-title">About Fit Track</div>
      <div class="about-desc">
        Fit Track is your personal fitness companion, helping you monitor your <b>workouts</b>, <b>nutrition</b>, and <b>progress</b>.<br>
        <span style="color:#75e0ff;">Sync your goals, enjoy data-driven insights, and experience wellness—designed for modern achievers.</span>
      </div>
      <div class="about-icons">
        <i class="bi bi-activity" title="Track Activities"></i>
        <i class="bi bi-gem" title="Achieve Goals"></i>
        <i class="bi bi-heart-pulse-fill" title="Personal Wellness"></i>
        <i class="bi bi-cpu" title="AI Analytics"></i>
      </div>
      <div class="about-tags">
        <span class="about-tag">Neon Glass UI</span>
        <span class="about-tag">AI Powered</span>
        <span class="about-tag">Fitness Insights</span>
        <span class="about-tag">Premium Feel</span>
      </div>
    </section>
  </main>
</body>
</html>
