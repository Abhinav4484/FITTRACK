<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Fit Track — Add Workout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@500;700&family=Inter:wght@400;700&display=swap');
    body {
      margin: 0;
      background: radial-gradient(ellipse at 65% 6%, #20d5ff50 2%, transparent 40%),
        radial-gradient(ellipse at 35% 90%, #6646ff44 2%, transparent 60%),
        linear-gradient(120deg, #12141f 0%, #020617 69%, #141933 100%);
      font-family: 'Inter', Arial, sans-serif;
      color: #e0f7ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    main.container {
      background: linear-gradient(125deg, #192744cc 70%, #091423cc 120%);
      border-radius: 2rem;
      box-shadow: 0 0 38px 4px #1e3f7f99;
      border: 1.5px solid #2061fe88;
      max-width: 480px;
      width: 100%;
      padding: 2.8rem 2rem 3rem;
      box-sizing: border-box;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 2.5rem;
      margin-bottom: 1.8rem;
      text-align: center;
      background: linear-gradient(90deg, #00eaff 40%, #3496ff 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px #00eaffaa;
    }
    label {
      font-size: 1.12rem;
      color: #8eecffcc;
      font-weight: 600;
      display: block;
      margin-bottom: 0.48rem;
    }
    input[type="text"],
    input[type="number"],
    select,
    textarea {
      background: #101f3a;
      border: 2.5px solid transparent;
      border-radius: 16px;
      padding: 0.82rem 1.2rem;
      width: 100%;
      color: #ccedff;
      font-size: 1rem;
      font-weight: 500;
      transition: all 0.25s ease;
      box-shadow: inset 0 2px 12px rgb(48 220 255 / 0.2);
      outline: none;
      resize: vertical;
      min-height: 2.75rem;
    }
    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus,
    textarea:focus {
      border-color: #1bcfff;
      box-shadow: 0 0 18px 3px #39caff88;
      background: #143053;
      color: #d7faff;
    }
    select {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, #00bfff 50%),
                        linear-gradient(135deg, #00bfff 50%, transparent 50%);
      background-position: calc(100% - 20px) calc(1rem + 2px), calc(100% - 15px) calc(1rem + 2px);
      background-size: 5px 5px;
      background-repeat: no-repeat;
      cursor: pointer;
      padding-right: 2.8rem;
    }
    button.btn {
      margin-top: 1.4rem;
      width: 100%;
      padding: 0.95rem 0;
      font-weight: 700;
      font-size: 1.18rem;
      border-radius: 26px;
      background: linear-gradient(90deg, #03e7ff 0%, #007aff 100%);
      color: white;
      box-shadow: 0 0 25px #00cfffaa;
      border: none;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.15s ease, box-shadow 0.3s ease;
    }
    button.btn:hover {
      background: linear-gradient(90deg, #00ffff 0%, #008fff 100%);
      box-shadow: 0 0 45px #40c0ffbb;
      transform: scale(1.05);
    }
    button.btn:active {
      transform: scale(0.99);
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Add Workout</h1>
    <form id="addWorkoutForm">
      <div class="mb-3">
        <label for="workoutName">Workout Name</label>
        <input id="workoutName" type="text" class="form-control" required placeholder="Enter workout name" />
      </div>
      <div class="mb-3">
        <label for="workoutType">Type</label>
        <select id="workoutType" class="form-select" required>
          <option value="" disabled selected>Select workout type</option>
          <option>Strength</option>
          <option>Cardio</option>
        </select>
      </div>
      <div class="mb-3">
        <label for="duration">Duration (minutes)</label>
        <input id="duration" type="number" class="form-control" min="1" max="300" required placeholder="Enter duration" />
      </div>
      <button type="submit" class="btn">Add</button>
    </form>
  </main>
  <script>
    // Optional: add JS form validation or submission handler as needed
    const form = document.getElementById('addWorkoutForm');
    form.addEventListener('submit', e => {
      e.preventDefault();
      // Implement your submit logic or leave to backend
      alert('Workout added successfully!');
      form.reset();
    });
  </script>
</body>
</html>
