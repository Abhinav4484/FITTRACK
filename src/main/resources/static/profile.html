<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>FITTRACK — PROFILE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="cyberpunk.css" rel="stylesheet">
  <style>
    /* Page-specific styles */
    .profile-header {
      font-family: 'Audiowide', monospace;
      font-weight: 400;
      font-size: 2.5rem;
      background: linear-gradient(135deg, var(--cp-neon-pink), var(--cp-neon-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
      margin-bottom: 0.5rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    
    .profile-subtitle {
      color: var(--cp-text-dim);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    
    .form-card {
      background: linear-gradient(135deg, rgba(26, 26, 46, 0.9) 0%, rgba(22, 33, 62, 0.9) 100%);
      border: 2px solid var(--cp-neon-cyan);
      border-radius: 0;
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      backdrop-filter: blur(15px);
      box-shadow: 
        0 0 40px rgba(0, 255, 255, 0.2),
        inset 0 0 0 1px rgba(255, 0, 255, 0.1);
    }
    
    .form-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--cp-neon-pink), var(--cp-neon-cyan), var(--cp-neon-yellow));
      animation: cyberpunkGlow 3s ease-in-out infinite;
    }
    
    .form-card:hover {
      border-color: var(--cp-neon-pink);
      box-shadow: 
        0 0 60px rgba(255, 0, 255, 0.4),
        inset 0 0 0 1px rgba(0, 255, 255, 0.2);
      transform: translateY(-8px);
    }
    
    .form-title {
      font-family: 'Audiowide', monospace;
      font-size: 1.5rem;
      font-weight: 400;
      background: linear-gradient(135deg, var(--cp-neon-pink), var(--cp-neon-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
    }
    
    .form-label {
      font-family: 'Rajdhani', sans-serif;
      color: var(--cp-neon-cyan);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
    }
    
    .form-control {
      background: rgba(26, 26, 46, 0.7);
      border: 2px solid rgba(0, 255, 255, 0.3);
      border-radius: 0;
      padding: 1rem 1.25rem;
      color: var(--cp-text-main);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      backdrop-filter: blur(10px);
    }
    
    .form-control:focus {
      border-color: var(--cp-neon-cyan);
      background: rgba(26, 26, 46, 0.9);
      outline: none;
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
      color: var(--cp-text-main);
    }
    
    .form-control::placeholder {
      color: var(--cp-text-dim);
      opacity: 0.7;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--cp-neon-pink), var(--cp-neon-cyan));
      border: 2px solid transparent;
      color: var(--cp-bg-dark);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 1rem 2rem;
      border-radius: 0;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
    }
    
    .btn-primary:hover {
      background: linear-gradient(135deg, var(--cp-neon-cyan), var(--cp-neon-pink));
      box-shadow: 0 0 50px rgba(255, 0, 255, 0.6);
      transform: translateY(-3px);
    }
    
    .btn-success {
      background: linear-gradient(135deg, var(--cp-neon-green), #00cc88);
      border: 2px solid transparent;
      color: var(--cp-bg-dark);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 1rem 2rem;
      border-radius: 0;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
    }
    
    .btn-success:hover {
      background: linear-gradient(135deg, #00cc88, var(--cp-neon-green));
      box-shadow: 0 0 50px rgba(0, 255, 136, 0.6);
      transform: translateY(-3px);
    }
    
    .btn-danger {
      background: transparent;
      border: 2px solid var(--cp-neon-red);
      color: var(--cp-neon-red);
      border-radius: 0;
      padding: 1rem 2rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: 0 0 20px rgba(255, 0, 102, 0.3);
    }
    
    .btn-danger:hover {
      background: var(--cp-neon-red);
      color: var(--cp-bg-dark);
      box-shadow: 0 0 40px rgba(255, 0, 102, 0.6);
      transform: translateY(-2px);
    }
    
    .forgot-password-link {
      color: var(--cp-neon-cyan);
      text-decoration: none;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
    }
    
    .forgot-password-link:hover {
      color: var(--cp-neon-pink);
      text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
    }
    
    .modal-content {
      background: linear-gradient(135deg, rgba(26, 26, 46, 0.95) 0%, rgba(22, 33, 62, 0.95) 100%);
      border: 2px solid var(--cp-neon-cyan);
      border-radius: 0;
      backdrop-filter: blur(15px);
      box-shadow: 0 0 50px rgba(0, 255, 255, 0.3);
    }
    
    .modal-header {
      border-bottom: 1px solid rgba(0, 255, 255, 0.3);
    }
    
    .modal-title {
      font-family: 'Audiowide', monospace;
      color: var(--cp-neon-cyan);
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    
    .btn-close {
      filter: invert(1);
    }
    
    /* Bootup sequence - hidden by default, shown on first visit */
    .bootup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--cp-bg-darker);
      z-index: 10000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .bootup-overlay.show {
      display: flex;
      animation: bootupFadeOut 0.5s ease-out 3s forwards;
    }
    
    .bootup-logo {
      font-family: 'Audiowide', monospace;
      font-size: 4rem;
      font-weight: 400;
      background: linear-gradient(135deg, var(--cp-neon-pink), var(--cp-neon-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 50px rgba(0, 255, 255, 0.8);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: bootupGlow 2s ease-in-out infinite;
    }
    
    .bootup-subtitle {
      font-family: 'Rajdhani', sans-serif;
      color: var(--cp-neon-cyan);
      font-size: 1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 1rem;
      animation: bootupPulse 1.5s ease-in-out infinite;
    }
    
    .bootup-progress {
      width: 300px;
      height: 4px;
      background: rgba(0, 255, 255, 0.2);
      border-radius: 2px;
      margin-top: 2rem;
      overflow: hidden;
    }
    
    .bootup-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--cp-neon-pink), var(--cp-neon-cyan));
      width: 0%;
      animation: bootupProgress 3s ease-out forwards;
    }
    
    @keyframes bootupGlow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.5)); }
      50% { filter: drop-shadow(0 0 40px rgba(255, 0, 255, 0.8)); }
    }
    
    @keyframes bootupPulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    
    @keyframes bootupProgress {
      0% { width: 0%; }
      100% { width: 100%; }
    }
    
    @keyframes bootupFadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }
  </style>
</head>
<body>
  <!-- Bootup Sequence -->
  <div class="bootup-overlay" id="bootupOverlay">
    <div class="bootup-logo">FITTRACK</div>
    <div class="bootup-subtitle">FITNESS TRACKING SYSTEM</div>
    <div class="bootup-progress">
      <div class="bootup-progress-bar"></div>
    </div>
  </div>

  <div class="container-fluid">
    <div class="row g-0">
      <!-- Sidebar -->
      <aside class="col-auto sidebar d-flex flex-column gap-3">
        <div class="brand">
          <div class="brand-logo">
            <span>FT</span>
          </div>
          <div class="brand-text">
                        <h1 style="font-size: 1.6rem; white-space: nowrap;">FITTRACK</h1>
            <p>FITNESS TRACKING SYSTEM</p>
          </div>
        </div>
        <nav class="nav flex-column">
          <a class="nav-link" href="index.html"><i class="bi bi-speedometer2"></i>Dashboard</a>
          <a class="nav-link" href="workouts.html"><i class="bi bi-bar-chart-line"></i>Workouts</a>
          <a class="nav-link" href="nutrition.html"><i class="bi bi-basket"></i>Nutrition</a>
          <a class="nav-link" href="progress.html"><i class="bi bi-graph-up"></i>Progress</a>
          <a class="nav-link active" href="profile.html"><i class="bi bi-person-circle"></i>Profile</a>
          <a class="nav-link" href="settings.html"><i class="bi bi-gear"></i>Settings</a>
          <a class="nav-link" href="details.html"><i class="bi bi-card-text"></i>Details</a>
        </nav>
      </aside>
      
      <main class="col d-flex justify-content-center">
        <div class="form-card w-100" style="max-width: 500px;">
          <!-- Login Form -->
          <div id="loginForm">
            <h3 class="form-title">LOGIN</h3>
            <form>
                <div class="mb-3">
                  <label class="form-label">Email</label>
                <input type="email" class="form-control" id="loginEmail" placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Password</label>
                <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" required>
              </div>
              <div class="mb-3">
                <a href="#" class="forgot-password-link" onclick="showForgotPasswordModal()">Forgot Password?</a>
                </div>
              <button type="submit" class="btn btn-primary w-100 mb-3">LOGIN</button>
              <button type="button" class="btn btn-success w-100" onclick="showRegisterForm()">CREATE ACCOUNT</button>
              </form>
            </div>

          <!-- Register Form -->
          <div id="registerForm" style="display: none;">
            <h3 class="form-title">REGISTER</h3>
            <form>
                <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" id="registerName" placeholder="Enter your full name" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Email</label>
                <input type="email" class="form-control" id="registerEmail" placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Password</label>
                <input type="password" class="form-control" id="registerPassword" placeholder="Create a password" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="registerConfirmPassword" placeholder="Confirm your password" required>
                </div>
              <button type="submit" class="btn btn-primary w-100 mb-3">REGISTER</button>
              <button type="button" class="btn btn-danger w-100" onclick="showLoginForm()">BACK TO LOGIN</button>
              </form>
            </div>

          <!-- Profile Form -->
          <div id="profileForm" style="display: none;">
            <h3 class="form-title">PROFILE</h3>
            <form>
                <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" id="profileName" placeholder="Enter your full name" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Email</label>
                <input type="email" class="form-control" id="profileEmail" placeholder="Enter your email" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Age</label>
                <input type="number" class="form-control" id="profileAge" placeholder="Enter your age" min="1" max="120">
                </div>
                <div class="mb-3">
                <label class="form-label">Height (cm)</label>
                <input type="number" class="form-control" id="profileHeight" placeholder="Enter your height" min="50" max="300">
                </div>
                <div class="mb-3">
                <label class="form-label">Weight (kg)</label>
                <input type="number" class="form-control" id="profileWeight" placeholder="Enter your weight" min="20" max="500">
                </div>
              <button type="submit" class="btn btn-primary w-100 mb-3">UPDATE PROFILE</button>
              <button type="button" class="btn btn-danger w-100" onclick="logout()">LOGOUT</button>
              </form>
            </div>

          <div id="message" class="mt-3"></div>
        </div>
      </main>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div class="modal fade" id="forgotPasswordModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">RESET PASSWORD</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="forgotPasswordForm">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="forgotEmail" placeholder="Enter your email" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">SEND RESET EMAIL</button>
          </form>
          <div id="forgotMessage" class="mt-3"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Reset Password Modal -->
  <div class="modal fade" id="resetPasswordModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">UPDATE PASSWORD</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="resetPasswordForm">
            <div class="mb-3">
              <label class="form-label">New Password</label>
              <input type="password" class="form-control" id="newPassword" placeholder="Enter new password" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Confirm New Password</label>
              <input type="password" class="form-control" id="confirmNewPassword" placeholder="Confirm new password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">UPDATE PASSWORD</button>
          </form>
          <div id="resetMessage" class="mt-3"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="cyberpunk-effects.js"></script>
<script>
    // Bootup sequence - show only on first visit
    if (!localStorage.getItem('fittrackFirstVisit')) {
      document.getElementById('bootupOverlay').classList.add('show');
      localStorage.setItem('fittrackFirstVisit', 'true');
    }
    
    window.addEventListener('load', function() {
      if (document.getElementById('bootupOverlay').classList.contains('show')) {
        setTimeout(() => {
          document.getElementById('bootupOverlay').style.display = 'none';
        }, 3500);
      }
    });

    // Check if user is logged in
  const userId = localStorage.getItem('userId');
    const userEmail = localStorage.getItem('userEmail');
    const userName = localStorage.getItem('userName');

    if (userId) {
      showProfileForm();
      loadUserProfile();
    } else {
      showLoginForm();
    }

    // Check for reset token in URL
    const urlParams = new URLSearchParams(window.location.search);
    const resetToken = urlParams.get('token');
    if (resetToken) {
      showResetPasswordModal();
    }

    function showLoginForm() {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('profileForm').style.display = 'none';
    }

    function showRegisterForm() {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
      document.getElementById('profileForm').style.display = 'none';
    }

    function showProfileForm() {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('profileForm').style.display = 'block';
    }

    function showForgotPasswordModal() {
      const modal = new bootstrap.Modal(document.getElementById('forgotPasswordModal'));
      modal.show();
    }

    function showResetPasswordModal() {
      const modal = new bootstrap.Modal(document.getElementById('resetPasswordModal'));
      modal.show();
    }

    function loadUserProfile() {
      if (userName) document.getElementById('profileName').value = userName;
      if (userEmail) document.getElementById('profileEmail').value = userEmail;
      
      // Load additional profile data from localStorage
      const profileData = localStorage.getItem('profileData');
      if (profileData) {
        const data = JSON.parse(profileData);
        if (data.age) document.getElementById('profileAge').value = data.age;
        if (data.height) document.getElementById('profileHeight').value = data.height;
        if (data.weight) document.getElementById('profileWeight').value = data.weight;
      }
    }

    function logout() {
      localStorage.removeItem('userId');
      localStorage.removeItem('userEmail');
      localStorage.removeItem('userName');
      localStorage.removeItem('profileData');
      showLoginForm();
      showMessage('Logged out successfully!', 'success');
    }

    function showMessage(text, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.textContent = text;
      messageDiv.className = `mt-3 text-${type}`;
      setTimeout(() => {
        messageDiv.textContent = '';
        messageDiv.className = '';
      }, 3000);
    }

    // Login form handler
    document.querySelector('#loginForm form').addEventListener('submit', async (e) => {
    e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      try {
        const response = await fetch('/api/users/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

        if (response.ok) {
          const user = await response.json();
      localStorage.setItem('userId', user.id);
          localStorage.setItem('userEmail', user.email);
          localStorage.setItem('userName', user.name);
          showProfileForm();
          loadUserProfile();
          showMessage('Login successful!', 'success');
      } else {
          showMessage('Invalid credentials!', 'danger');
      }
      } catch (error) {
        showMessage('Login failed. Please try again.', 'danger');
    }
  });

    // Register form handler
    document.querySelector('#registerForm form').addEventListener('submit', async (e) => {
    e.preventDefault();
      const name = document.getElementById('registerName').value;
      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;
      const confirmPassword = document.getElementById('registerConfirmPassword').value;

    if (password !== confirmPassword) {
        showMessage('Passwords do not match!', 'danger');
      return;
    }

      try {
        const response = await fetch('/api/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
      });

        if (response.ok) {
          const user = await response.json();
      localStorage.setItem('userId', user.id);
          localStorage.setItem('userEmail', user.email);
          localStorage.setItem('userName', user.name);
          localStorage.setItem('justRegistered', 'true');
          showProfileForm();
          showMessage('Registration successful! Please add your profile details.', 'success');
      } else {
          showMessage('Registration failed. Email might already exist.', 'danger');
        }
      } catch (error) {
        showMessage('Registration failed. Please try again.', 'danger');
      }
    });

    // Profile form handler
    document.querySelector('#profileForm form').addEventListener('submit', async (e) => {
    e.preventDefault();
      const name = document.getElementById('profileName').value;
      const email = document.getElementById('profileEmail').value;
      const age = document.getElementById('profileAge').value;
      const height = document.getElementById('profileHeight').value;
      const weight = document.getElementById('profileWeight').value;

      try {
        const response = await fetch(`/api/users/${userId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, age: parseInt(age), height: parseInt(height), weight: parseInt(weight) })
        });

        if (response.ok) {
          localStorage.setItem('userName', name);
          localStorage.setItem('userEmail', email);
          
          // Save profile data
          const profileData = { age, height, weight };
          localStorage.setItem('profileData', JSON.stringify(profileData));
          
          // Store individual fields for easy access
          if (age) localStorage.setItem('userAge', age);
          if (height) localStorage.setItem('userHeight', height);
          if (weight) localStorage.setItem('userWeight', weight);
          
          showMessage('Profile updated successfully!', 'success');
        } else {
          showMessage('Profile update failed.', 'danger');
        }
      } catch (error) {
        showMessage('Profile update failed. Please try again.', 'danger');
      }
    });

    // Forgot password form handler
    document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
      const email = document.getElementById('forgotEmail').value;

      try {
        const response = await fetch('/api/users/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const messageDiv = document.getElementById('forgotMessage');
        if (response.ok) {
          messageDiv.textContent = 'Reset email sent! Check your inbox.';
          messageDiv.className = 'mt-3 text-success';
        } else {
          messageDiv.textContent = 'Email not found or error occurred.';
          messageDiv.className = 'mt-3 text-danger';
        }
      } catch (error) {
        const messageDiv = document.getElementById('forgotMessage');
        messageDiv.textContent = 'Error sending reset email.';
        messageDiv.className = 'mt-3 text-danger';
      }
    });

    // Reset password form handler
    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
      const newPassword = document.getElementById('newPassword').value;
      const confirmNewPassword = document.getElementById('confirmNewPassword').value;

      if (newPassword !== confirmNewPassword) {
        const messageDiv = document.getElementById('resetMessage');
        messageDiv.textContent = 'Passwords do not match!';
        messageDiv.className = 'mt-3 text-danger';
        return;
      }

    try {
        const response = await fetch('/api/users/reset-password', {
          method: 'POST',
        headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: resetToken, password: newPassword })
        });

        const messageDiv = document.getElementById('resetMessage');
        if (response.ok) {
          messageDiv.textContent = 'Password updated successfully!';
          messageDiv.className = 'mt-3 text-success';
          setTimeout(() => {
      window.location.href = 'profile.html';
          }, 2000);
        } else {
          messageDiv.textContent = 'Password reset failed.';
          messageDiv.className = 'mt-3 text-danger';
        }
      } catch (error) {
        const messageDiv = document.getElementById('resetMessage');
        messageDiv.textContent = 'Error updating password.';
        messageDiv.className = 'mt-3 text-danger';
      }
    });
</script>
</body>
</html>
