<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Fit Track — Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@500;700&family=Inter:wght@400;700&display=swap');

    body {
      margin: 0;
      background:
        radial-gradient(ellipse at 65% 6%, #20d5ff5a 2%, transparent 40%),
        radial-gradient(ellipse at 35% 90%, #6646ff44 2%, transparent 60%),
        linear-gradient(120deg, #12141f 0%, #020617 69%, #141933 100%);
      font-family: 'Inter', Arial, sans-serif;
      color: #e0f7ff;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    main.container {
      max-width: 900px;
      margin: 0 auto;
      background: linear-gradient(125deg, #192744cc 70%, #091423cc 120%);
      border-radius: 2rem;
      box-shadow: 0 0 45px 8px #1e3f7f99;
      border: 1.5px solid #2061fe88;
      padding: 3rem 2rem;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 2.8rem;
      margin-bottom: 1.6rem;
      text-align: center;
      background: linear-gradient(90deg, #00eaff 35%, #3496ff 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px #00eaffaa;
    }
    p {
      font-size: 1.18rem;
      max-width: 70ch;
      line-height: 1.6;
      margin: 0 auto 2.5rem auto;
      color: #b3e4ffcc;
      text-align: center;
    }
    .card {
      background: linear-gradient(110deg, #223152cc, #111a38cc);
      border-radius: 2rem;
      border: 1px solid #2e619f66;
      box-shadow: 0 4px 30px 12px #0a429c55;
      color: #b4daffcc;
      padding: 2rem 2rem;
      margin-bottom: 2rem;
      transition: box-shadow 0.25s ease, transform 0.3s ease;
      cursor: default;
    }
    .card:hover {
      box-shadow: 0 10px 45px 18px #21d0fff2;
      transform: scale(1.04);
      color: #e2f7ff;
    }
    canvas#chart {
      display: block;
      max-width: 100%;
      height: 200px;
      margin: 0 auto;
      border-radius: 1.5rem;
      background: #0a1a3b;
      box-shadow: 0 4px 15px #208aff88 inset;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Dashboard</h1>
    <p>Welcome to Fit Track! View your stats and recent activities here.</p>

    <div class="card" aria-label="Steps taken today">
      <h3>Today's Steps</h3>
      <p style="font-size: 2rem; font-weight: 900; color:#4fb7ff;">6,432</p>
    </div>

    <div class="card" aria-label="Calories burned today">
      <h3>Calories Burned (Today)</h3>
      <p style="font-size: 2rem; font-weight: 900; color:#42d6fc;">1,780 kcal</p>
    </div>

    <div class="card" aria-label="Workouts this week">
      <h3>Workouts Completed</h3>
      <p style="font-size: 2rem; font-weight: 900; color:#38c4f4;">4</p>
    </div>

    <canvas id="chart" aria-label="Steps over last five days" role="img"></canvas>

    <script>
      const ctx = document.getElementById('chart');
      const chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'],
          datasets: [{
            label: 'Steps',
            data: [4000, 6000, 8000, 7500, 9000],
            borderColor: '#4f46e5',
            backgroundColor: 'rgba(165, 180, 252, 0.7)',
            fill: true,
            tension: 0.4,
            pointRadius: 6
          }]
        },
        options: {
          responsive:true,
          plugins: { legend: { display: false } },
          animation: { duration: 1500, easing: 'easeOutQuad' },
          scales: {
            y: {
              beginAtZero: true,
              ticks: { color: '#7eb9ff' },
              grid: { color: '#202a50' }
            },
            x: {
              ticks: { color: '#7eb9ff' },
              grid: { color: '#202a50' }
            }
          }
        }
      });
    </script>
  </main>
</body>
</html>
