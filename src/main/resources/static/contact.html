<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>FITTRACK — CONTACT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="cyberpunk.css" rel="stylesheet">
  <style>
    /* Page-specific styles */
    .contact-main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    
    .contact-container {
      background: linear-gradient(135deg, rgba(26, 26, 46, 0.9) 0%, rgba(22, 33, 62, 0.9) 100%);
      border: 2px solid var(--cp-neon-cyan);
      border-radius: 0;
      box-shadow: 
        0 0 50px rgba(0, 255, 255, 0.3),
        inset 0 0 0 1px rgba(255, 0, 255, 0.1);
      max-width: 500px;
      width: 100%;
      padding: 3rem 2rem;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(15px);
    }
    
    .contact-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--cp-neon-pink), var(--cp-neon-cyan), var(--cp-neon-yellow));
      animation: cyberpunkGlow 3s ease-in-out infinite;
    }
    
    .contact-title {
      font-family: 'Audiowide', monospace;
      font-size: 2.5rem;
      font-weight: 400;
      background: linear-gradient(135deg, var(--cp-neon-pink), var(--cp-neon-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
      margin-bottom: 2rem;
      text-align: center;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    
    .form-label {
      font-family: 'Rajdhani', sans-serif;
      color: var(--cp-neon-cyan);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
    }
    
    .form-control {
      background: rgba(26, 26, 46, 0.7);
      border: 2px solid rgba(0, 255, 255, 0.3);
      border-radius: 0;
      padding: 1rem 1.25rem;
      color: var(--cp-text-main);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      backdrop-filter: blur(10px);
      margin-bottom: 1rem;
    }
    
    .form-control:focus {
      border-color: var(--cp-neon-cyan);
      background: rgba(26, 26, 46, 0.9);
      outline: none;
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
      color: var(--cp-text-main);
    }
    
    .form-control::placeholder {
      color: var(--cp-text-dim);
      opacity: 0.7;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--cp-neon-pink), var(--cp-neon-cyan));
      border: 2px solid transparent;
      color: var(--cp-bg-dark);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 1rem 2rem;
      border-radius: 0;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
      width: 100%;
    }
    
    .btn-primary:hover {
      background: linear-gradient(135deg, var(--cp-neon-cyan), var(--cp-neon-pink));
      box-shadow: 0 0 50px rgba(255, 0, 255, 0.6);
      transform: translateY(-3px);
    }
    
    .contact-info {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(0, 255, 255, 0.3);
    }
    
    .contact-item {
      display: flex;
      align-items: center;
      margin-bottom: 1rem;
      color: var(--cp-text-main);
    }
    
    .contact-icon {
      color: var(--cp-neon-cyan);
      margin-right: 1rem;
      font-size: 1.2rem;
    }
    
    .contact-text {
      font-family: 'Rajdhani', sans-serif;
      color: var(--cp-text-dim);
    }
    
    .message-status {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 0;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: none;
    }
    
    .message-status.success {
      background: rgba(0, 255, 136, 0.2);
      border: 1px solid var(--cp-neon-green);
      color: var(--cp-neon-green);
    }
    
    .message-status.error {
      background: rgba(255, 0, 102, 0.2);
      border: 1px solid var(--cp-neon-red);
      color: var(--cp-neon-red);
    }
    
    /* Bootup sequence */
    .bootup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--cp-bg-darker);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: bootupFadeOut 0.5s ease-out 3s forwards;
    }
    
    .bootup-logo {
      font-family: 'Audiowide', monospace;
      font-size: 4rem;
      font-weight: 400;
      background: linear-gradient(135deg, var(--cp-neon-pink), var(--cp-neon-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 50px rgba(0, 255, 255, 0.8);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: bootupGlow 2s ease-in-out infinite;
    }
    
    .bootup-subtitle {
      font-family: 'Rajdhani', sans-serif;
      color: var(--cp-neon-cyan);
      font-size: 1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 1rem;
      animation: bootupPulse 1.5s ease-in-out infinite;
    }
    
    .bootup-progress {
      width: 300px;
      height: 4px;
      background: rgba(0, 255, 255, 0.2);
      border-radius: 2px;
      margin-top: 2rem;
      overflow: hidden;
    }
    
    .bootup-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--cp-neon-pink), var(--cp-neon-cyan));
      width: 0%;
      animation: bootupProgress 3s ease-out forwards;
    }
    
    @keyframes bootupGlow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.5)); }
      50% { filter: drop-shadow(0 0 40px rgba(255, 0, 255, 0.8)); }
    }
    
    @keyframes bootupPulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    
    @keyframes bootupProgress {
      0% { width: 0%; }
      100% { width: 100%; }
    }
    
    @keyframes bootupFadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }
  </style>
</head>
<body>
  <!-- Bootup Sequence -->
  <div class="bootup-overlay" id="bootupOverlay">
    <div class="bootup-logo">FITTRACK</div>
    <div class="bootup-subtitle">FITNESS TRACKING SYSTEM</div>
    <div class="bootup-progress">
      <div class="bootup-progress-bar"></div>
    </div>
  </div>

  <main class="contact-main">
    <div class="contact-container">
      <h1 class="contact-title">CONTACT US</h1>
      
      <form id="contactForm">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" id="contactName" placeholder="Enter your name" required>
        </div>
        
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="contactEmail" placeholder="Enter your email" required>
        </div>
        
        <div class="mb-3">
          <label class="form-label">Subject</label>
          <input type="text" class="form-control" id="contactSubject" placeholder="Enter subject" required>
        </div>
        
        <div class="mb-3">
          <label class="form-label">Message</label>
          <textarea class="form-control" id="contactMessage" rows="5" placeholder="Enter your message" required></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary">SEND MESSAGE</button>
        
        <div class="message-status" id="messageStatus"></div>
      </form>
      
      <div class="contact-info">
        <div class="contact-item">
          <i class="bi bi-envelope contact-icon"></i>
          <div class="contact-text">support@fittrack.cyber</div>
        </div>
        <div class="contact-item">
          <i class="bi bi-telephone contact-icon"></i>
          <div class="contact-text">+1 (555) CYBER-FIT</div>
        </div>
        <div class="contact-item">
          <i class="bi bi-geo-alt contact-icon"></i>
          <div class="contact-text">Night City, Cyberpunk District</div>
        </div>
        <div class="contact-item">
          <i class="bi bi-clock contact-icon"></i>
          <div class="contact-text">24/7 Support Available</div>
        </div>
      </div>
      
      <div class="text-center mt-4">
        <a href="index.html" class="btn btn-primary">
          <i class="bi bi-arrow-left me-2"></i>BACK TO DASHBOARD
        </a>
      </div>
    </div>
  </main>

  <script src="cyberpunk-effects.js"></script>
  <script>
    // Bootup sequence
    window.addEventListener('load', function() {
      setTimeout(() => {
        document.getElementById('bootupOverlay').style.display = 'none';
      }, 3500);
    });

    // Contact form handler
    document.getElementById('contactForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('contactName').value;
      const email = document.getElementById('contactEmail').value;
      const subject = document.getElementById('contactSubject').value;
      const message = document.getElementById('contactMessage').value;
      
      const messageStatus = document.getElementById('messageStatus');
      
      try {
        // Simulate sending message (replace with actual API call)
        await new Promise(resolve => setTimeout(resolve, 1000));
        
        messageStatus.textContent = 'Message sent successfully! We\'ll get back to you soon.';
        messageStatus.className = 'message-status success';
        messageStatus.style.display = 'block';
        
        // Reset form
        document.getElementById('contactForm').reset();
        
        setTimeout(() => {
          messageStatus.style.display = 'none';
        }, 5000);
        
      } catch (error) {
        messageStatus.textContent = 'Failed to send message. Please try again.';
        messageStatus.className = 'message-status error';
        messageStatus.style.display = 'block';
        
        setTimeout(() => {
          messageStatus.style.display = 'none';
        }, 5000);
      }
    });
  </script>
</body>
</html>
