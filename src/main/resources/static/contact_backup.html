<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Fit Track — Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@500;700&family=Inter:wght@400;700&display=swap');
    body {
      margin: 0;
      background: radial-gradient(ellipse at 65% 6%, #20d5ff50 2%, transparent 40%),
        radial-gradient(ellipse at 35% 90%, #6646ff44 2%, transparent 60%),
        linear-gradient(120deg, #12141f 0%, #020617 69%, #141933 100%);
      font-family: 'Inter', Arial, sans-serif;
      color: #e0f7ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    main.container {
      background: linear-gradient(125deg, #192744cc 70%, #091423cc 120%);
      border-radius: 2rem;
      box-shadow: 0 0 38px 4px #1e3f7f99;
      border: 1.5px solid #2061fe88;
      max-width: 480px;
      width: 100%;
      padding: 2.8rem 2rem 3rem;
      box-sizing: border-box;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 2.5rem;
      margin-bottom: 2rem;
      text-align: center;
      background: linear-gradient(90deg, #00eaff 40%, #3496ff 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px #00eaffaa;
    }
    label {
      font-size: 1.12rem;
      color: #8eecffcc;
      font-weight: 600;
      display: block;
      margin-bottom: 0.5rem;
    }
    input[type="text"],
    input[type="email"],
    textarea {
      background: #101f3a;
      border: 2.5px solid transparent;
      border-radius: 16px;
      padding: 0.85rem 1.2rem;
      width: 100%;
      color: #ccedff;
      font-size: 1rem;
      font-weight: 500;
      transition: all 0.25s ease;
      box-shadow: inset 0 2px 12px rgb(48 220 255 / 0.2);
      outline: none;
      resize: vertical;
      min-height: 2.75rem;
      margin-bottom: 1.5rem;
    }
    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      border-color: #1bcfff;
      box-shadow: 0 0 18px 3px #39caff88;
      background: #143053;
      color: #d7faff;
    }
    textarea {
      min-height: 98px;
    }
    button.btn {
      margin-top: 0.5rem;
      width: 100%;
      padding: 0.95rem 0;
      font-weight: 700;
      font-size: 1.18rem;
      border-radius: 26px;
      background: linear-gradient(90deg, #03e7ff 0%, #007aff 100%);
      color: white;
      box-shadow: 0 0 25px #00cfffaa;
      border: none;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.15s ease, box-shadow 0.3s ease;
    }
    button.btn:hover {
      background: linear-gradient(90deg, #00ffff 0%, #008fff 100%);
      box-shadow: 0 0 45px #40c0ffbb;
      transform: scale(1.05);
    }
    button.btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <main class="container" role="main">
    <h1>Contact Us</h1>
    <form id="contactForm" novalidate>
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" placeholder="Your full name" required />
      
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Your email address" required />
      
      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Your message" required></textarea>
      
      <button type="submit" class="btn">Send</button>
    </form>
  </main>
  <script>
    const form = document.getElementById('contactForm');
    form.addEventListener('submit', event => {
      event.preventDefault();
      if (!form.checkValidity()) {
        alert("Please fill out all fields correctly.");
        return;
      }
      alert("Message sent. Thank you!");
      form.reset();
    });
  </script>
</body>
</html>
