<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Fit Track — Progress</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap');
    
    :root {
      --primary: #6366f1;
      --primary-light: #818cf8;
      --primary-dark: #4f46e5;
      --secondary: #ec4899;
      --secondary-light: #f472b6;
      --accent: #06b6d4;
      --accent-light: #22d3ee;
      --success: #10b981;
      --success-light: #34d399;
      --warning: #f59e0b;
      --warning-light: #fbbf24;
      --danger: #ef4444;
      --danger-light: #f87171;
      --purple: #8b5cf6;
      --purple-light: #a78bfa;
      --orange: #f97316;
      --orange-light: #fb923c;
      
      --background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --surface: rgba(255, 255, 255, 0.95);
      --surface-hover: rgba(255, 255, 255, 1);
      --glass: rgba(255, 255, 255, 0.1);
      --glass-hover: rgba(255, 255, 255, 0.2);
      
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.3);
      
      --radius: 1rem;
      --radius-sm: 0.5rem;
      --radius-lg: 1.5rem;
      
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-fast: all 0.15s ease;
      --transition-slow: all 0.5s ease;
    }
    
    * {
      box-sizing: border-box;
    }
    
    body {
      background: var(--background);
      min-height: 100vh;
      margin: 0;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 40% 60%, rgba(6, 182, 212, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
      animation: backgroundFloat 20s ease-in-out infinite;
    }
    
    @keyframes backgroundFloat {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(1deg); }
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes fadeInLeft {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    
    .sidebar {
      min-width: 240px; 
      max-width: 260px;
      background: var(--surface);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--text-primary);
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      z-index: 1000;
      box-shadow: var(--shadow-xl);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      user-select: none;
      animation: fadeInLeft 0.8s ease-out;
    }
    
    .sidebar a.nav-link { 
      color: var(--text-secondary);
      font-weight: 500;
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    
    .sidebar a.nav-link::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.1), transparent);
      transition: left 0.5s ease;
    }
    
    .sidebar a.nav-link:hover::before {
      left: 100%;
    }
    
    .sidebar a.nav-link.active, .sidebar a.nav-link:hover { 
      background: var(--glass);
      color: var(--primary);
      transform: translateX(8px);
      box-shadow: var(--shadow-glow);
    }
    
    .main-content {
      margin-left: 260px;
      padding: 2rem;
      min-height: 100vh;
      animation: fadeInUp 1s ease-out 0.4s both;
    }
    
    .progress-card {
      background: var(--surface);
      backdrop-filter: blur(20px);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: var(--shadow-xl);
      padding: 2rem;
      margin-bottom: 2rem;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      animation: fadeInUp 1s ease-out both;
    }
    
    .progress-card:nth-child(1) { animation-delay: 0.6s; }
    .progress-card:nth-child(2) { animation-delay: 0.8s; }
    .progress-card:nth-child(3) { animation-delay: 1s; }
    
    .progress-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
      background-size: 200% 100%;
      animation: shimmer 3s ease-in-out infinite;
    }
    
    .progress-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-xl), var(--shadow-glow);
    }
    
    .progress-card h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
    }
    
    .chart-container {
      position: relative;
      height: 300px;
      margin-top: 1.5rem;
    }
    
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    
    .stat-item {
      background: var(--glass);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius);
      padding: 1.5rem;
      text-align: center;
      transition: var(--transition);
    }
    
    .stat-item:hover {
      background: var(--glass-hover);
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }
    
    .stat-value {
      font-family: 'Poppins', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: pulse 2s ease-in-out infinite;
    }
    
    .stat-label {
      color: var(--text-muted);
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0.5rem;
    }
    
    /* Smooth scrolling */
    html {
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    
    /* Performance optimizations for 60fps */
    * {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      perspective: 1000px;
    }
    
    .progress-card, .sidebar a, .btn {
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
    }
    
    @media (max-width: 768px) {
      .main-content {
        margin-left: 0;
        padding: 1rem;
      }
      
      .sidebar {
        position: relative;
        width: 100%;
        height: auto;
        min-width: 100%;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="row g-0">
      <!-- Sidebar -->
      <aside class="col-auto sidebar d-flex flex-column gap-3">
        <div class="d-flex align-items-center gap-2 mb-3">
          <div class="rounded-circle d-flex align-items-center justify-content-center" style="width:44px;height:44px; background: linear-gradient(135deg, var(--primary), var(--secondary)); box-shadow: var(--shadow-glow);">
            <span class="fw-bold text-white" style="font-family: 'Poppins', sans-serif; font-size: 1.2rem;">FT</span>
          </div>
          <div>
            <div class="fw-bold" style="font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">FITTRACK</div>
            <div class="muted-sm" style="color: var(--text-muted); font-size: 0.8rem;">FITNESS TRACKER</div>
          </div>
        </div>
        <nav class="nav flex-column">
          <a class="nav-link" href="index.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
          <a class="nav-link" href="workouts.html"><i class="bi bi-bar-chart-line me-2"></i>Workouts</a>
          <a class="nav-link" href="nutrition.html"><i class="bi bi-basket me-2"></i>Nutrition</a>
          <a class="nav-link active" href="progress.html"><i class="bi bi-graph-up me-2"></i>Progress</a>
          <a class="nav-link" href="profile.html"><i class="bi bi-person-circle me-2"></i>Profile</a>
          <a class="nav-link" href="settings.html"><i class="bi bi-gear me-2"></i>Settings</a>
        </nav>
      </aside>
      
      <!-- Main Content -->
      <main class="main-content">
        <div class="progress-card">
          <h3><i class="bi bi-graph-up me-2"></i>Workout Progress</h3>
          <p class="text-muted mb-4">Track your fitness journey over time</p>
          
          <div class="chart-container">
            <canvas id="workoutChart"></canvas>
          </div>
        </div>
        
        <div class="progress-card">
          <h3><i class="bi bi-calendar-check me-2"></i>Workout Frequency</h3>
          <p class="text-muted mb-4">Weekly workout activity</p>
          
          <div class="chart-container">
            <canvas id="frequencyChart"></canvas>
          </div>
        </div>
        
        <div class="progress-card">
          <h3><i class="bi bi-trophy me-2"></i>Workout Statistics</h3>
          
          <div class="stat-grid">
            <div class="stat-item">
              <div class="stat-value" id="totalWorkouts">0</div>
              <div class="stat-label">Total Workouts</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="thisWeek">0</div>
              <div class="stat-label">This Week</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="avgDuration">0</div>
              <div class="stat-label">Avg Duration (min)</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="totalMinutes">0</div>
              <div class="stat-label">Total Minutes</div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

<script>
  const userId = localStorage.getItem('userId');
  
  if (!userId) {
    window.location.href = 'profile.html';
  }

  // Load and display progress data
  async function loadProgressData() {
    try {
      const response = await fetch(`/api/workouts/user/${userId}`);
      if (!response.ok) {
        throw new Error('Failed to load progress data');
      }
      const workouts = await response.json();
      
      if (workouts && workouts.length > 0) {
        // Process data for charts
        const workoutChart = processWorkoutChart(workouts);
        const frequencyChart = processFrequencyChart(workouts);
        const stats = calculateStats(workouts);
        
        // Update statistics
        document.getElementById('totalWorkouts').textContent = stats.total;
        document.getElementById('thisWeek').textContent = stats.thisWeek;
        document.getElementById('avgDuration').textContent = stats.avgDuration;
        document.getElementById('totalMinutes').textContent = stats.totalMinutes;
        
        // Create charts
        createWorkoutChart(workoutChart.labels, workoutChart.data);
        createFrequencyChart(frequencyChart.labels, frequencyChart.data);
      } else {
        // Show empty state
        document.querySelectorAll('.chart-container').forEach(container => {
          container.innerHTML = '<p class="text-center text-muted">No workout data available yet. Start tracking your workouts!</p>';
        });
      }
    } catch (error) {
      console.error('Error loading progress data:', error);
    }
  }

  function processWorkoutChart(workouts) {
    // Group workouts by date
    const grouped = {};
    workouts.forEach(workout => {
      const date = new Date(workout.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      if (!grouped[date]) {
        grouped[date] = 0;
      }
      grouped[date]++;
    });
    
    const labels = Object.keys(grouped).sort((a, b) => new Date(a) - new Date(b));
    const data = labels.map(label => grouped[label]);
    
    return { labels, data };
  }

  function processFrequencyChart(workouts) {
    // Group by week
    const weeklyData = {};
    workouts.forEach(workout => {
      const week = getWeekFromDate(new Date(workout.date));
      weeklyData[week] = (weeklyData[week] || 0) + 1;
    });
    
    const labels = Object.keys(weeklyData).sort();
    const data = labels.map(label => weeklyData[label]);
    
    return { labels, data };
  }

  function getWeekFromDate(date) {
    const startOfYear = new Date(date.getFullYear(), 0, 1);
    const days = Math.floor((date - startOfYear) / (24 * 60 * 60 * 1000));
    return `Week ${Math.ceil((days + startOfYear.getDay() + 1) / 7)}`;
  }

  function calculateStats(workouts) {
    const total = workouts.length;
    const thisWeek = workouts.filter(w => {
      const workoutDate = new Date(w.date);
      const now = new Date();
      const weekStart = new Date(now.setDate(now.getDate() - now.getDay()));
      return workoutDate >= weekStart;
    }).length;
    
    const totalMinutes = workouts.reduce((sum, w) => sum + (w.durationMinutes || 0), 0);
    const avgDuration = total > 0 ? Math.round(totalMinutes / total) : 0;
    
    return {
      total,
      thisWeek,
      avgDuration,
      totalMinutes
    };
  }

  function createWorkoutChart(labels, data) {
    const ctx = document.getElementById('workoutChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Workouts',
          data: data,
          borderColor: '#6366f1',
          backgroundColor: 'rgba(99, 102, 241, 0.1)',
          borderWidth: 3,
          fill: true,
          tension: 0.4,
          pointRadius: 6,
          pointHoverRadius: 8,
          pointBackgroundColor: '#6366f1',
          pointBorderColor: '#fff',
          pointBorderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: false
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: {
              stepSize: 1
            }
          }
        }
      }
    });
  }

  function createFrequencyChart(labels, data) {
    const ctx = document.getElementById('frequencyChart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Workouts per Week',
          data: data,
          backgroundColor: 'rgba(236, 72, 153, 0.3)',
          borderColor: '#ec4899',
          borderWidth: 2,
          borderRadius: 8
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: false
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: {
              stepSize: 1
            }
          }
        }
      }
    });
  }

  window.onload = loadProgressData;
</script>
</body>
</html>
